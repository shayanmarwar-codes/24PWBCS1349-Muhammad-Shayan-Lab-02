<h1>Student Registration Form</h1>

<form>
<label for="name">Name:</label>
<input type="text" id="name" name="name"><br><br>

<label for="reg">Registration Number:</label>
<input type="text" id="reg" name="reg"><br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email"><br><br>

<label for="password">Password:</label>
<input type="password" id="password" name="password"><br><br>

<label for="course">Select Course:</label>
<select id="course" name="course">
<option>Web Technologies</option>
<option>Programming</option>
<option>Mathematics</option>
<option>Physics</option>
</select><br><br>

Semester:
<input type="radio" id="sem1" name="semester" value="1"><label for="sem1">1</label>
<input type="radio" id="sem2" name="semester" value="2"><label for="sem2">2</label>
<input type="radio" id="sem3" name="semester" value="3"><label for="sem3">3</label>
<input type="radio" id="sem4" name="semester" value="4"><label for="sem4">4</label>
<input type="radio" id="sem5" name="semester" value="5"><label for="sem5">5</label>
<input type="radio" id="sem6" name="semester" value="6"><label for="sem6">6</label>
<input type="radio" id="sem7" name="semester" value="7"><label for="sem7">7</label>
<input type="radio" id="sem8" name="semester" value="8"><label for="sem8">8</label><br><br>

<input type="checkbox" id="terms" name="terms">
<label for="terms">I accept the terms and conditions</label><br><br>

<input type="submit" value="Submit">
</form>
