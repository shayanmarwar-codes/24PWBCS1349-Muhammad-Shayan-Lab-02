<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 15px;
        }
        nav a {
            text-decoration: none;
            padding: 5px 10px;
            color: black;
            font-weight: bold;
        }
        nav a.active {
            background-color: #4CAF50;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="schedule.html">Courses</a></li>
            <li><a href="registration.html" class="active">Registration</a></li>
            <li><a href="https://www.uet.edu.pk" target="_blank">UET Website</a></li>
        </ul>
    </nav>

    <h1>Student Registration Form</h1>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="reg">Registration Number:</label>
        <input type="text" id="reg" name="reg"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="course">Select Course:</label>
        <select id="course" name="course">
            <option>Web Technologies</option>
            <option>Programming</option>
            <option>Mathematics</option>
            <option>Physics</option>
        </select><br><br>

        Semester:
        <input type="radio" id="sem1" name="semester" value="1">
        <label for="sem1">1</label>
        <input type="radio" id="sem2" name="semester" value="2">
        <label for="sem2">2</label>
        <input type="radio" id="sem3" name="semester" value="3">
        <label for="sem3">3</label>
        <input type="radio" id="sem4" name="semester" value="4">
        <label for="sem4">4</label>
        <input type="radio" id="sem5" name="semester" value="5">
        <label for="sem5">5</label>
        <input type="radio" id="sem6" name="semester" value="6">
        <label for="sem6">6</label>
        <input type="radio" id="sem7" name="semester" value="7">
        <label for="sem7">7</label>
        <input type="radio" id="sem8" name="semester" value="8">
        <label for="sem8">8</label><br><br>

        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I accept the terms and conditions</label><br><br>

        <input type="submit" value="Submit">
    </form>

    <p><a href="index.html">← Back to Home</a></p>

</body>
</html>
